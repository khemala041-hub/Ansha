<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enquiries — Ansha Shine Kids School ERP</title>
<link rel="stylesheet" href="assets/css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root { --red:#c0392b; --blue:#1a5276; }
  body { font-family:'Segoe UI',sans-serif; background:#f4f6f8; margin:0; }
  .topbar {
    background: linear-gradient(90deg,var(--blue),var(--red));
    color:white; padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar h1 { font-size:1.1rem; }
  .topbar a  { color:rgba(255,255,255,0.8); text-decoration:none; font-size:0.85rem; }
  .container { max-width:1200px; margin:0 auto; padding:20px; }

  /* Stats */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
  .stat-card {
    background:white; border-radius:12px; padding:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08); text-align:center;
  }
  .stat-card .num { font-size:1.8rem; font-weight:800; color:var(--blue); }
  .stat-card .lbl { font-size:0.78rem; color:#777; margin-top:2px; }

  /* Table */
  .card { background:white; border-radius:14px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; flex-wrap:wrap; gap:10px;
  }
  .card-header h2 { font-size:1rem; color:var(--blue); }
  .filters { display:flex; gap:8px; flex-wrap:wrap; }
  .filters input, .filters select {
    padding:7px 11px; border:1.5px solid #dde; border-radius:8px;
    font-size:0.83rem; outline:none;
  }
  .btn-export {
    background:var(--blue); color:white; border:none;
    border-radius:8px; padding:8px 16px; font-size:0.83rem;
    cursor:pointer; font-weight:600;
  }
  table { width:100%; border-collapse:collapse; font-size:0.83rem; }
  th {
    background:var(--blue); color:white;
    padding:9px 10px; text-align:left; font-weight:600;
    font-size:0.78rem; letter-spacing:0.3px;
  }
  th:first-child { border-radius:8px 0 0 0; }
  th:last-child  { border-radius:0 8px 0 0; }
  td { padding:9px 10px; border-bottom:1px solid #f0f0f0; color:#333; vertical-align:top; }
  tr:hover td { background:#f8f9ff; }
  .badge {
    display:inline-block; padding:3px 9px; border-radius:20px;
    font-size:0.72rem; font-weight:700;
  }
  .badge-new      { background:#e8f4fd; color:#1a5276; }
  .badge-called   { background:#e8f8f5; color:#1e8449; }
  .badge-admitted { background:#fef9e7; color:#b7950b; }
  .badge-lost     { background:#fdedec; color:#c0392b; }
  .action-btn {
    background:none; border:1px solid #dde; border-radius:6px;
    padding:3px 9px; font-size:0.75rem; cursor:pointer; color:#555;
    margin-right:3px;
  }
  .action-btn:hover { background:var(--blue); color:white; border-color:var(--blue); }
  .empty { text-align:center; padding:40px; color:#aaa; font-size:0.9rem; }
  @media(max-width:600px) {
    .stats { grid-template-columns:1fr 1fr; }
    table  { font-size:0.75rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>📋 Admission Enquiries</h1>
  <a href="dashboard.html">← Back to Dashboard</a>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="num" id="s-total">0</div><div class="lbl">Total Enquiries</div></div>
    <div class="stat-card"><div class="num" id="s-new">0</div><div class="lbl">New (Today)</div></div>
    <div class="stat-card"><div class="num" id="s-called">0</div><div class="lbl">Called / In Progress</div></div>
    <div class="stat-card"><div class="num" id="s-admitted">0</div><div class="lbl">Admitted</div></div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="card-header">
      <h2>All Enquiries</h2>
      <div class="filters">
        <input type="text" id="search" placeholder="🔍 Search name / phone..." oninput="renderTable()"/>
        <select id="filter-status" onchange="renderTable()">
          <option value="">All Status</option>
          <option value="New">New</option>
          <option value="Called">Called</option>
          <option value="Admitted">Admitted</option>
          <option value="Lost">Lost</option>
        </select>
        <select id="filter-branch" onchange="renderTable()">
          <option value="">All Branches</option>
          <option value="B001">Branch 1</option>
          <option value="B002">Branch 2</option>
          <option value="B003">Branch 3</option>
          <option value="B004">Branch 4</option>
          <option value="B005">Branch 5</option>
          <option value="B006">Branch 6</option>
          <option value="B007">Branch 7</option>
          <option value="B008">Branch 8</option>
          <option value="B009">Branch 9</option>
          <option value="B010">Branch 10</option>
        </select>
        <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Ref No</th>
            <th>Child Name</th>
            <th>Program</th>
            <th>Father Name</th>
            <th>WhatsApp</th>
            <th>Branch</th>
            <th>Referred By</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="enquiry-tbody"></tbody>
      </table>
    </div>
    <div id="empty-msg" class="empty" style="display:none">No enquiries found.</div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://wtcumlqwapqqkbjpjoco.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_rOJdCtFChg6_FHm1hrQd1w_UcBC_m1T';
  const SCHOOL_WA    = '919600000000'; // Replace with school WhatsApp

  let _sb  = null;
  let DATA = [];

  try { _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e){}

  async function loadData() {
    // Try Supabase first
    if (_sb) {
      try {
        const { data } = await _sb.from('erp_data').select('value').eq('key','enquiries').single();
        if (data && Array.isArray(data.value)) {
          DATA = data.value;
          localStorage.setItem('asks_enquiries', JSON.stringify(DATA));
          renderAll();
          return;
        }
      } catch(e){}
    }
    // Fallback to localStorage
    DATA = JSON.parse(localStorage.getItem('asks_enquiries') || '[]');
    renderAll();
  }

  function renderAll() {
    updateStats();
    renderTable();
  }

  function updateStats() {
    const today = new Date().toDateString();
    document.getElementById('s-total').textContent    = DATA.length;
    document.getElementById('s-new').textContent      = DATA.filter(d => new Date(d.submittedAt).toDateString() === today).length;
    document.getElementById('s-called').textContent   = DATA.filter(d => d.status === 'Called').length;
    document.getElementById('s-admitted').textContent = DATA.filter(d => d.status === 'Admitted').length;
  }

  function renderTable() {
    const q       = document.getElementById('search').value.toLowerCase();
    const sStat   = document.getElementById('filter-status').value;
    const sBranch = document.getElementById('filter-branch').value;

    let filtered = DATA.filter(d => {
      const match = (d.childName+d.fatherName+d.whatsapp+d.refNo).toLowerCase().includes(q);
      const stat  = !sStat   || d.status  === sStat;
      const brn   = !sBranch || d.branch  === sBranch;
      return match && stat && brn;
    });

    const tbody = document.getElementById('enquiry-tbody');
    const empty = document.getElementById('empty-msg');

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.slice().reverse().map((d, i) => {
      const date   = new Date(d.submittedAt).toLocaleDateString('en-IN');
      const badge  = { New:'badge-new', Called:'badge-called', Admitted:'badge-admitted', Lost:'badge-lost' }[d.status] || 'badge-new';
      const waLink = `https://api.whatsapp.com/send?phone=91${d.whatsapp.replace(/\D/g,'')}&text=${encodeURIComponent('Hello ' + d.fatherName + ', Thank you for enquiring about Ansha Shine Kids School. We will contact you shortly.')}`;
      return `<tr>
        <td>${i+1}</td>
        <td style="font-size:0.72rem;color:#888">${d.refNo||'—'}</td>
        <td><strong>${d.childName}</strong><br/><span style="color:#999;font-size:0.75rem">${d.program||''}</span></td>
        <td>${d.program||'—'}</td>
        <td>${d.fatherName||'—'}</td>
        <td>${d.whatsapp||'—'}</td>
        <td>${d.branch||'—'}</td>
        <td>${d.referral||'—'}</td>
        <td>${date}</td>
        <td><span class="badge ${badge}">${d.status||'New'}</span></td>
        <td>
          <a href="${waLink}" target="_blank"><button class="action-btn">📱 WA</button></a>
          <button class="action-btn" onclick="changeStatus('${d.refNo}','Called')">📞</button>
          <button class="action-btn" onclick="changeStatus('${d.refNo}','Admitted')">✅</button>
          <button class="action-btn" onclick="changeStatus('${d.refNo}','Lost')">❌</button>
        </td>
      </tr>`;
    }).join('');
  }

  async function changeStatus(refNo, status) {
    const idx = DATA.findIndex(d => d.refNo === refNo);
    if (idx < 0) return;
    DATA[idx].status = status;
    localStorage.setItem('asks_enquiries', JSON.stringify(DATA));
    if (_sb) {
      try {
        await _sb.from('erp_data').upsert(
          { key:'enquiries', value:DATA, updated_at: new Date().toISOString() },
          { onConflict:'key' }
        );
      } catch(e){}
    }
    renderAll();
  }

  function exportCSV() {
    const headers = ['RefNo','Date','ChildName','DOB','Gender','Religion','MotherTongue','Program','FatherName','MotherName','WhatsApp','AltPhone','Email','Address','Branch','ReferredBy','Status','Message'];
    const rows = DATA.map(d => [
      d.refNo, new Date(d.submittedAt).toLocaleDateString('en-IN'),
      d.childName, d.dob, d.gender, d.religion, d.motherTongue, d.program,
      d.fatherName, d.motherName, d.whatsapp, d.altPhone, d.email,
      `"${(d.address||'').replace(/"/g,'""')}"`, d.branch, d.referral, d.status,
      `"${(d.message||'').replace(/"/g,'""')}"`
    ].join(','));
    const csv  = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type:'text/csv' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'enquiries_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }

  loadData();
</script>
</body>
</html>
