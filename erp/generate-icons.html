<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(id, size) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const r = size * 0.12;

  // Background
  ctx.fillStyle = '#1E3A5F';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Star emoji
  ctx.font = `${size * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🌟', size / 2, size / 2 - size * 0.05);

  // Text
  ctx.fillStyle = '#F59E0B';
  ctx.font = `bold ${size * 0.10}px sans-serif`;
  ctx.fillText('ANSHA ERP', size / 2, size * 0.82);
}

drawIcon('c192', 192);
drawIcon('c512', 512);

// Download both
function download(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}

download('c192', 'icon-192.png');
setTimeout(() => download('c512', 'icon-512.png'), 500);
</script>
</body>
</html>
