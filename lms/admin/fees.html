<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fee Management — Ansha Montessori LMS</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-left"><span class="page-title">Fee Management</span></div>
      <div class="header-right"><span id="user-name" class="text-sm font-medium"></span></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div>
          <h1>💰 Fee Management</h1>
          <p>View and update student fee details</p>
        </div>
      </div>

      <!-- Quick Student Search -->
      <div class="card mb-4" style="border:2px solid #6366f1;border-radius:14px;">
        <div class="card-body" style="padding:18px 20px;">
          <div style="font-weight:700;font-size:1rem;margin-bottom:10px;color:#6366f1;">🔎 Quick Edit — Search Student</div>
          <div style="position:relative;">
            <input type="text" id="quick-search" class="form-control" placeholder="Type enrollment no., name, or mobile number…" autocomplete="off"
              oninput="quickSearchFees(this.value)" style="padding-left:2.5rem;font-size:1rem;">
            <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:1.1rem;">🔍</span>
          </div>
          <div id="quick-results" style="margin-top:8px;max-height:280px;overflow-y:auto;display:none;border:1px solid #e2e8f0;border-radius:10px;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.08);"></div>
        </div>
      </div>

      <!-- Fee Stats -->
      <div class="stats-grid" id="fee-stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:var(--space-5);"></div>

      <!-- Filter Bar -->
      <div class="filter-bar mt-4">
        <div class="search-input">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="Search student name or phone…">
        </div>
        <select class="form-control" id="filter-course" style="width:auto;min-width:200px;">
          <option value="">All Courses</option>
        </select>
        <select class="form-control" id="filter-status" style="width:auto;min-width:160px;">
          <option value="">All Status</option>
          <option value="paid">Fully Paid</option>
          <option value="partial">Partially Paid</option>
          <option value="pending">Pending</option>
        </select>
      </div>

      <!-- Fee Table -->
      <div class="card mt-4">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Student</th>
                <th>Course</th>
                <th>Original Fee (₹)</th>
                <th>Discount (₹)</th>
                <th>Net Fee (₹)</th>
                <th>Paid (₹)</th>
                <th>Balance (₹)</th>
                <th>Payment Method</th>
                <th>Next Due</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="fee-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Edit Fee Modal -->
<div class="modal-backdrop" id="edit-fee-modal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <h3 id="modal-title">Edit Fee Details</h3>
      <button class="modal-close" onclick="closeModal('edit-fee-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-enrollment-id">
      <div style="display:grid;gap:16px;">
        <div>
          <label class="form-label">Student</label>
          <div id="edit-student-info" style="font-weight:600;font-size:0.95rem;padding:8px 12px;background:#f8fafc;border-radius:8px;"></div>
        </div>
        <div>
          <label class="form-label">Course</label>
          <div id="edit-course-info" style="font-size:0.9rem;padding:8px 12px;background:#f8fafc;border-radius:8px;"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label class="form-label">Original Fee (₹) <span style="color:#dc2626;">*</span></label>
            <input type="number" id="edit-total-fee" class="form-control" min="0" step="500" placeholder="e.g. 22000" oninput="recalcBalance()">
          </div>
          <div>
            <label class="form-label">Discount (₹)</label>
            <input type="number" id="edit-discount" class="form-control" min="0" step="100" placeholder="e.g. 2000" oninput="recalcBalance()">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label class="form-label">Net Fee After Discount (₹)</label>
            <input type="number" id="edit-net-fee" class="form-control" style="background:#f0fdf4;font-weight:700;color:#16a34a;" readonly>
          </div>
          <div>
            <label class="form-label">Paid Amount (₹) <span style="color:#dc2626;">*</span></label>
            <input type="number" id="edit-paid-amt" class="form-control" min="0" step="500" placeholder="e.g. 5000" oninput="recalcBalance()">
          </div>
        </div>
        <div>
          <label class="form-label">Balance (₹)</label>
          <input type="number" id="edit-balance" class="form-control" style="background:#f8fafc;font-weight:700;" readonly>
        </div>
        <div>
          <label class="form-label">Payment Method</label>
          <input type="text" id="edit-payment-method" class="form-control" placeholder="e.g. Shakila Gpay, Cash, NEFT…">
        </div>
        <div>
          <label class="form-label">Next Payment Due Date</label>
          <input type="date" id="edit-next-due" class="form-control">
        </div>
      </div>
    </div>
    <div class="modal-footer" style="display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid #e2e8f0;">
      <button class="btn btn-ghost" onclick="closeModal('edit-fee-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveFeeEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<!-- Record Payment Modal -->
<div class="modal-backdrop" id="pay-modal">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <h3 id="pay-modal-title">Record Payment</h3>
      <button class="modal-close" onclick="closeModal('pay-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pay-enrollment-id">
      <div style="display:grid;gap:14px;">
        <div>
          <div id="pay-student-info" style="font-weight:600;font-size:0.9rem;padding:8px 12px;background:#f8fafc;border-radius:8px;margin-bottom:4px;"></div>
          <div id="pay-balance-info" style="font-size:0.82rem;padding:6px 12px;background:#fff7ed;border-radius:8px;color:#9a3412;font-weight:600;"></div>
        </div>
        <div>
          <label class="form-label">Payment Plan</label>
          <select id="pay-plan" class="form-control" onchange="renderPaymentSlots()">
            <option value="full">💳 Full Payment (1 time)</option>
            <option value="2x">📅 2 Installments</option>
            <option value="4x">📆 4 Installments</option>
          </select>
        </div>
        <div id="pay-slots"></div>
        <div>
          <label class="form-label">Payment Method</label>
          <input type="text" id="pay-method" class="form-control" placeholder="e.g. Shakila Gpay, Cash, NEFT…">
        </div>
        <div>
          <label class="form-label">Payment Date</label>
          <input type="date" id="pay-date" class="form-control">
        </div>
      </div>
    </div>
    <div class="modal-footer" style="display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid #e2e8f0;">
      <button class="btn btn-ghost" onclick="closeModal('pay-modal')">Cancel</button>
      <button class="btn btn-success" onclick="savePayment()">✅ Record Payment</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/utils.js"></script>
<script>
const user = initPage('admin');
if (user) { sbSyncToLocal(user.id, 'admin').then(renderPage).catch(renderPage); }

function renderPage() {
  populateCourseFilter();
  renderFeeStats();
  renderFeeTable();
  document.getElementById('search-input').addEventListener('input', renderFeeTable);
  document.getElementById('filter-course').addEventListener('change', renderFeeTable);
  document.getElementById('filter-status').addEventListener('change', renderFeeTable);

  // Auto-open modal if navigated from Student Information page
  const target = sessionStorage.getItem('fees_target');
  if (target) {
    sessionStorage.removeItem('fees_target');
    try {
      const { enrollmentId, action } = JSON.parse(target);
      setTimeout(() => {
        if (action === 'pay') openPayModal(enrollmentId);
        else openEditModal(enrollmentId);
      }, 300);
    } catch(e) {}
  }
}

function populateCourseFilter() {
  const courses = dbGet(DB.COURSES);
  document.getElementById('filter-course').innerHTML =
    '<option value="">All Courses</option>' +
    courses.map(c => `<option value="${c.id}">${c.icon||'📚'} ${c.title}</option>`).join('');
}

function getFeeData(enrollment) {
  const fp = enrollment.feePlan;
  if (!fp) {
    const course = dbGetOne(DB.COURSES, enrollment.courseId);
    return { totalFee: course ? course.fee || 0 : 0, paidAmt: 0, balance: course ? course.fee || 0 : 0, paymentMethod: '', nextDueDate: '' };
  }
  if (fp.excelImport) {
    return { originalFee: fp.originalFee || fp.totalFee || 0, discount: fp.discount || 0, totalFee: fp.totalFee || 0, paidAmt: fp.paidAmount || 0, balance: fp.balance != null ? fp.balance : Math.max(0, (fp.totalFee||0) - (fp.paidAmount||0)), paymentMethod: fp.paymentMethod || '', nextDueDate: fp.nextDueDate || '' };
  }
  const sched = computeFeeSchedule(enrollment.studentId, enrollment.courseId);
  return sched
    ? { totalFee: sched.totalFee, paidAmt: sched.paidAmt, balance: sched.balance, paymentMethod: fp.paymentMethod || '', nextDueDate: fp.nextDueDate || '' }
    : { totalFee: fp.totalFee || 0, paidAmt: 0, balance: fp.totalFee || 0, paymentMethod: '', nextDueDate: '' };
}

function renderFeeStats() {
  const enrollments = dbGet(DB.ENROLLMENTS);
  let totalFeeAll = 0, paidAll = 0, balanceAll = 0, pendingCount = 0;
  enrollments.forEach(e => {
    const fd = getFeeData(e);
    totalFeeAll += fd.totalFee;
    paidAll     += fd.paidAmt;
    balanceAll  += fd.balance;
    if (fd.balance > 0) pendingCount++;
  });
  document.getElementById('fee-stats').innerHTML = `
    <div class="stat-card"><div class="stat-icon green">💰</div><div class="stat-info"><div class="stat-value">₹${paidAll.toLocaleString('en-IN')}</div><div class="stat-label">Total Collected</div></div></div>
    <div class="stat-card"><div class="stat-icon red">⏳</div><div class="stat-info"><div class="stat-value">₹${balanceAll.toLocaleString('en-IN')}</div><div class="stat-label">Total Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon teal">📋</div><div class="stat-info"><div class="stat-value">${pendingCount}</div><div class="stat-label">Students with Balance</div></div></div>
    <div class="stat-card"><div class="stat-icon gold">🎓</div><div class="stat-info"><div class="stat-value">${enrollments.length}</div><div class="stat-label">Total Enrollments</div></div></div>`;
}

function renderFeeTable() {
  const enrollments = dbGet(DB.ENROLLMENTS);
  const searchQ     = document.getElementById('search-input').value.toLowerCase();
  const courseFilter = document.getElementById('filter-course').value;
  const statusFilter = document.getElementById('filter-status').value;

  let rows = '';
  enrollments.forEach(e => {
    const student = dbGetOne(DB.USERS, e.studentId);
    const course  = dbGetOne(DB.COURSES, e.courseId);
    if (!student || !course) return;
    if (courseFilter && e.courseId !== courseFilter) return;
    if (searchQ && !student.name.toLowerCase().includes(searchQ) && !(student.phone||'').includes(searchQ)) return;

    const fd = getFeeData(e);
    const { totalFee, paidAmt, balance, paymentMethod, nextDueDate } = fd;

    let feeStatus = balance === 0 ? 'paid' : paidAmt > 0 ? 'partial' : 'pending';
    if (statusFilter && feeStatus !== statusFilter) return;

    const statusHtml = feeStatus === 'paid'
      ? `<span class="badge badge-success">✅ Fully Paid</span>`
      : feeStatus === 'partial'
      ? `<span class="badge badge-warning">⏳ Partial</span>`
      : `<span class="badge badge-danger">🔴 Pending</span>`;

    const dueDateHtml = nextDueDate && balance > 0
      ? `<span style="color:#d97706;font-size:0.78rem;font-weight:600;">${new Date(nextDueDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>`
      : `<span class="text-muted text-xs">—</span>`;

    rows += `<tr>
      <td>
        <div class="flex items-center gap-2">
          <div class="avatar avatar-sm">${student.avatar || getInitials(student.name)}</div>
          <div>
            <div class="font-medium text-sm">${student.name}</div>
            <div class="text-xs text-muted">${student.phone || student.email || ''}</div>
          </div>
        </div>
      </td>
      <td class="text-sm">${course.icon||'📚'} ${course.title}</td>
      <td class="font-semibold">₹${(fd.originalFee||totalFee).toLocaleString('en-IN')}</td>
      <td style="color:${(fd.discount||0)>0?'#7c3aed':'#94a3b8'};font-weight:700;">${(fd.discount||0)>0?'₹'+(fd.discount).toLocaleString('en-IN'):'—'}</td>
      <td class="font-semibold" style="color:#0d9488;">₹${totalFee.toLocaleString('en-IN')}</td>
      <td style="color:#16a34a;font-weight:700;">₹${paidAmt.toLocaleString('en-IN')}</td>
      <td style="color:${balance===0?'#16a34a':'#dc2626'};font-weight:700;">₹${balance.toLocaleString('en-IN')}</td>
      <td class="text-sm">${paymentMethod || '<span class="text-muted">—</span>'}</td>
      <td>${dueDateHtml}</td>
      <td>${statusHtml}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-primary btn-sm" onclick="openEditModal('${e.id}')">✏️ Edit</button>
        <button class="btn btn-success btn-sm" style="margin-left:6px;" onclick="openPayModal('${e.id}')">💰 Pay</button>
      </td>
    </tr>`;
  });

  document.getElementById('fee-table').innerHTML = rows || '<tr><td colspan="11" class="text-center text-muted" style="padding:2rem;">No records found</td></tr>';
}

function openEditModal(enrollmentId) {
  const e = dbGetOne(DB.ENROLLMENTS, enrollmentId);
  if (!e) return;
  const student = dbGetOne(DB.USERS, e.studentId);
  const course  = dbGetOne(DB.COURSES, e.courseId);
  const fd = getFeeData(e);

  document.getElementById('edit-enrollment-id').value = enrollmentId;
  document.getElementById('edit-student-info').textContent = student ? `${student.avatar||'👩‍🎓'} ${student.name} · ${student.phone || student.email || ''}` : '—';
  document.getElementById('edit-course-info').textContent  = course ? `${course.icon||'📚'} ${course.title}` : '—';
  const fp = e.feePlan || {};
  document.getElementById('edit-total-fee').value    = fp.originalFee || fd.totalFee || '';
  document.getElementById('edit-discount').value     = fp.discount || 0;
  document.getElementById('edit-net-fee').value      = fd.totalFee || '';
  document.getElementById('edit-paid-amt').value     = fd.paidAmt || '';
  document.getElementById('edit-balance').value      = fd.balance || '';
  document.getElementById('edit-payment-method').value = fd.paymentMethod || '';
  document.getElementById('edit-next-due').value     = fd.nextDueDate ? fd.nextDueDate.split('T')[0] : '';
  document.getElementById('modal-title').textContent = `Edit Fee — ${student ? student.name : ''}`;
  openModal('edit-fee-modal');
}

function recalcBalance() {
  const original = parseFloat(document.getElementById('edit-total-fee').value) || 0;
  const discount = parseFloat(document.getElementById('edit-discount').value)  || 0;
  const netFee   = Math.max(0, original - discount);
  const paid     = parseFloat(document.getElementById('edit-paid-amt').value)  || 0;
  document.getElementById('edit-net-fee').value  = netFee;
  document.getElementById('edit-balance').value  = Math.max(0, netFee - paid);
}

function saveFeeEdit() {
  const enrollmentId = document.getElementById('edit-enrollment-id').value;
  const e = dbGetOne(DB.ENROLLMENTS, enrollmentId);
  if (!e) return;

  const originalFee = parseFloat(document.getElementById('edit-total-fee').value) || 0;
  const discount    = parseFloat(document.getElementById('edit-discount').value)  || 0;
  const netFee      = Math.max(0, originalFee - discount);
  const paid        = parseFloat(document.getElementById('edit-paid-amt').value)  || 0;
  const balance     = Math.max(0, netFee - paid);
  const method      = document.getElementById('edit-payment-method').value.trim();
  const nextDue     = document.getElementById('edit-next-due').value;

  e.feePlan = {
    type: 'full',
    originalFee,
    discount,
    totalFee: netFee,
    paidAmount: paid,
    balance,
    paymentMethod: method,
    nextDueDate: nextDue || '',
    excelImport: true,
    updatedAt: new Date().toISOString()
  };
  e.feeStatus = balance === 0 ? 'paid' : paid > 0 ? 'partial' : 'pending';

  dbSave(DB.ENROLLMENTS, e);
  closeModal('edit-fee-modal');
  renderFeeStats();
  renderFeeTable();
  showToast(`Fee updated for student ✓`, 'success');
}

function openPayModal(enrollmentId) {
  const e = dbGetOne(DB.ENROLLMENTS, enrollmentId);
  if (!e) return;
  const student = dbGetOne(DB.USERS, e.studentId);
  const course  = dbGetOne(DB.COURSES, e.courseId);
  const fd = getFeeData(e);

  document.getElementById('pay-enrollment-id').value = enrollmentId;
  document.getElementById('pay-modal-title').textContent = `Record Payment — ${student ? student.name : ''}`;
  document.getElementById('pay-student-info').textContent = `${student?.avatar||'👩‍🎓'} ${student?.name} · ${course?.title||''}`;
  document.getElementById('pay-balance-info').textContent = `Balance Due: ₹${fd.balance.toLocaleString('en-IN')}  |  Paid so far: ₹${fd.paidAmt.toLocaleString('en-IN')}`;
  document.getElementById('pay-method').value = fd.paymentMethod || '';
  document.getElementById('pay-date').value = new Date().toISOString().split('T')[0];

  // Pre-select plan from feePlan if set
  const fp = e.feePlan || {};
  document.getElementById('pay-plan').value = fp.paymentPlan || 'full';
  renderPaymentSlots();
  openModal('pay-modal');
}

function renderPaymentSlots() {
  const enrollmentId = document.getElementById('pay-enrollment-id').value;
  const e = dbGetOne(DB.ENROLLMENTS, enrollmentId);
  const fd = getFeeData(e);
  const plan = document.getElementById('pay-plan').value;
  const numSlots = plan === '4x' ? 4 : plan === '2x' ? 2 : 1;
  const netFee = fd.totalFee;
  const suggested = numSlots > 1 ? Math.round(netFee / numSlots) : netFee;

  // Get existing payments for this enrollment
  const existing = dbGet(DB.PAYMENTS).filter(p => p.studentId === e.studentId && p.courseId === e.courseId)
    .sort((a,b) => a.installmentNo - b.installmentNo);

  let html = `<div style="font-size:0.82rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Installments</div>`;
  for (let i = 1; i <= numSlots; i++) {
    const paid = existing.find(p => p.installmentNo === i);
    const bgColor = paid ? '#f0fdf4' : '#fff';
    const borderColor = paid ? '#86efac' : '#e2e8f0';
    html += `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${bgColor};border:1.5px solid ${borderColor};border-radius:8px;margin-bottom:8px;">
      <div style="font-weight:700;font-size:0.85rem;min-width:80px;">Instalment ${i}</div>
      <input type="number" id="pay-amt-${i}" class="form-control" style="max-width:130px;" value="${paid ? paid.amount : suggested}" placeholder="₹ amount" ${paid ? 'disabled style="opacity:0.6;"' : ''}>
      ${paid
        ? `<span style="color:#16a34a;font-size:0.8rem;font-weight:700;">✅ Paid on ${new Date(paid.paidAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>`
        : `<span style="font-size:0.78rem;color:#94a3b8;">Pending</span>`}
    </div>`;
  }
  document.getElementById('pay-slots').innerHTML = html;
}

function savePayment() {
  const enrollmentId = document.getElementById('pay-enrollment-id').value;
  const e = dbGetOne(DB.ENROLLMENTS, enrollmentId);
  if (!e) return;

  const plan   = document.getElementById('pay-plan').value;
  const method = document.getElementById('pay-method').value.trim();
  const date   = document.getElementById('pay-date').value || new Date().toISOString();
  const numSlots = plan === '4x' ? 4 : plan === '2x' ? 2 : 1;

  // Get existing payments
  const existing = dbGet(DB.PAYMENTS).filter(p => p.studentId === e.studentId && p.courseId === e.courseId);
  let totalPaid = 0, newCount = 0;

  for (let i = 1; i <= numSlots; i++) {
    const input = document.getElementById(`pay-amt-${i}`);
    if (!input || input.disabled) {
      // Already paid — count it
      const p = existing.find(x => x.installmentNo === i);
      if (p) totalPaid += p.amount || 0;
      continue;
    }
    const amt = parseFloat(input.value) || 0;
    if (amt <= 0) continue;
    const payment = {
      id: genId(),
      studentId: e.studentId,
      courseId: e.courseId,
      enrollmentId,
      amount: amt,
      installmentNo: i,
      paymentMethod: method,
      paidAt: new Date(date).toISOString(),
      receiptNo: `RCP-${Date.now().toString(36).toUpperCase()}`,
      recordedBy: user.id
    };
    dbSave(DB.PAYMENTS, payment);
    totalPaid += amt;
    newCount++;
  }

  // Also count any pre-existing payments not in slots
  existing.forEach(p => { if (p.installmentNo > numSlots) totalPaid += p.amount || 0; });

  // Update feePlan with payment plan and new paid total
  const fp = e.feePlan || {};
  const netFee = fp.totalFee || 0;
  const balance = Math.max(0, netFee - totalPaid);
  e.feePlan = { ...fp, paymentPlan: plan, paidAmount: totalPaid, balance, paymentMethod: method, updatedAt: new Date().toISOString() };
  e.feeStatus = balance === 0 ? 'paid' : totalPaid > 0 ? 'partial' : 'pending';
  dbSave(DB.ENROLLMENTS, e);

  closeModal('pay-modal');
  renderFeeStats();
  renderFeeTable();
  showToast(`${newCount} payment(s) recorded ✓`, 'success');
}

function quickSearchFees(q) {
  const box = document.getElementById('quick-results');
  q = q.trim().toLowerCase();
  if (!q) { box.style.display = 'none'; box.innerHTML = ''; return; }

  const enrollments = dbGet(DB.ENROLLMENTS);
  const matches = [];
  enrollments.forEach(e => {
    const student = dbGetOne(DB.USERS, e.studentId);
    const course  = dbGetOne(DB.COURSES, e.courseId);
    if (!student || !course) return;
    const enNo = (e.enrollmentNumber || '').toString().toLowerCase();
    const name = (student.name || '').toLowerCase();
    const phone = (student.phone || '').toLowerCase();
    if (enNo.includes(q) || name.includes(q) || phone.includes(q)) {
      matches.push({ e, student, course });
    }
  });

  if (!matches.length) {
    box.style.display = 'block';
    box.innerHTML = '<div style="padding:14px 16px;color:#94a3b8;font-size:0.9rem;">No students found</div>';
    return;
  }

  const fd_map = matches.map(({ e, student, course }) => {
    const fd = getFeeData(e);
    const status = fd.balance === 0 ? '✅ Paid' : fd.paidAmt > 0 ? '⏳ Partial' : '🔴 Pending';
    const statusColor = fd.balance === 0 ? '#16a34a' : fd.paidAmt > 0 ? '#d97706' : '#dc2626';
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f1f5f9;gap:12px;"
               onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:0.95rem;">${student.name}</div>
        <div style="font-size:0.78rem;color:#64748b;">${e.enrollmentNumber ? '#'+e.enrollmentNumber+' · ' : ''}${student.phone || student.email || ''} · ${course.icon||'📚'} ${course.title}</div>
        <div style="font-size:0.78rem;margin-top:2px;">
          <span style="color:#16a34a;">Paid: ₹${fd.paidAmt.toLocaleString('en-IN')}</span>
          &nbsp;|&nbsp;
          <span style="color:#dc2626;">Balance: ₹${fd.balance.toLocaleString('en-IN')}</span>
          &nbsp;|&nbsp;
          <span style="color:${statusColor};font-weight:600;">${status}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('quick-search').value='';document.getElementById('quick-results').style.display='none';openEditModal('${e.id}')">✏️ Edit</button>
        <button class="btn btn-success btn-sm" onclick="document.getElementById('quick-search').value='';document.getElementById('quick-results').style.display='none';openPayModal('${e.id}')">💰 Pay</button>
      </div>
    </div>`;
  });

  box.innerHTML = fd_map.join('');
  box.style.display = 'block';
}
</script>
</body>
</html>
