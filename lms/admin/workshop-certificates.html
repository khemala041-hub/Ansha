<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Workshop Certificates — Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=20260426">
  <link rel="stylesheet" href="../assets/css/components.css?v=20260426">
  <style>
    .cert-hero { background: linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; border-radius:16px; padding:24px 28px; margin-bottom:24px; display:flex; align-items:center; gap:20px; }
    .cert-hero-icon { font-size:3rem; }
    .cert-hero h2 { font-size:1.4rem; font-weight:800; margin-bottom:4px; }
    .cert-hero p { color:rgba(255,255,255,0.75); font-size:0.875rem; }

    /* Workshop settings */
    .settings-card { background:#fff; border-radius:14px; padding:22px 24px; box-shadow:var(--shadow); margin-bottom:24px; }
    .settings-card h3 { font-size:0.9rem; font-weight:700; color:var(--gray-700); margin-bottom:16px; border-bottom:1px solid var(--gray-100); padding-bottom:10px; }
    .settings-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
    .s-field label { font-size:0.75rem; font-weight:700; color:var(--gray-600); display:block; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.05em; }
    .s-field input { width:100%; padding:9px 12px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:0.875rem; box-sizing:border-box; }
    .s-field input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(13,148,136,0.12); }

    /* Participant list */
    .part-card { background:#fff; border-radius:14px; box-shadow:var(--shadow); overflow:hidden; }
    .part-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--gray-100); gap:12px; flex-wrap:wrap; }
    .part-header h3 { font-size:0.95rem; font-weight:700; color:var(--gray-800); }
    .btn-generate-all { background:linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; border:none; padding:10px 20px; border-radius:10px; font-size:0.85rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .btn-generate-all:hover { opacity:0.9; }
    .btn-generate-all:disabled { opacity:0.5; cursor:not-allowed; }

    /* Manual add */
    .manual-row { display:flex; gap:10px; padding:14px 20px; background:var(--gray-50); border-bottom:1px solid var(--gray-200); flex-wrap:wrap; align-items:flex-end; }
    .manual-row input { flex:1; min-width:180px; padding:9px 12px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:0.875rem; }
    .btn-add-manual { background:var(--primary); color:#fff; border:none; padding:9px 16px; border-radius:8px; font-size:0.82rem; font-weight:700; cursor:pointer; white-space:nowrap; }

    /* Participant rows */
    .part-row { display:flex; align-items:center; padding:14px 20px; border-bottom:1px solid var(--gray-100); gap:14px; flex-wrap:wrap; }
    .part-row:last-child { border-bottom:none; }
    .part-row:hover { background:var(--gray-50); }
    .part-check { width:18px; height:18px; cursor:pointer; flex-shrink:0; }
    .part-avatar { width:40px; height:40px; background:linear-gradient(135deg,#1e3a5f,#2563eb); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.9rem; font-weight:800; flex-shrink:0; }
    .part-info { flex:1; min-width:120px; }
    .part-name { font-size:0.9rem; font-weight:700; color:var(--gray-800); }
    .part-meta { font-size:0.72rem; color:var(--gray-400); margin-top:2px; }
    .btn-cert { background:#1e3a5f; color:#fff; border:none; padding:7px 14px; border-radius:8px; font-size:0.78rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:5px; white-space:nowrap; }
    .btn-cert:hover { background:#2563eb; }
    .btn-cert.done { background:#10b981; }
    .btn-wa-cert { background:#25D366; color:#fff; border:none; padding:7px 12px; border-radius:8px; font-size:0.78rem; font-weight:700; cursor:pointer; white-space:nowrap; }

    /* Progress */
    .progress-bar-wrap { background:var(--gray-100); border-radius:8px; height:8px; overflow:hidden; margin-top:6px; }
    .progress-bar-fill { background:linear-gradient(90deg,#1e3a5f,#2563eb); height:100%; border-radius:8px; transition:width 0.4s; }

    /* Preview modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal-box { background:#fff; border-radius:16px; padding:24px; max-width:700px; width:95%; }
    .modal-box h3 { font-size:1rem; font-weight:700; margin-bottom:14px; }
    .modal-box iframe { width:100%; height:380px; border:1px solid var(--gray-200); border-radius:8px; }
    .modal-actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
    .btn-download { background:var(--primary); color:#fff; border:none; padding:10px 20px; border-radius:8px; font-size:0.875rem; font-weight:700; cursor:pointer; }
    .btn-close-modal { background:var(--gray-200); color:var(--gray-700); border:none; padding:10px 20px; border-radius:8px; font-size:0.875rem; font-weight:700; cursor:pointer; }

    /* Empty */
    .empty-cert { text-align:center; padding:48px 20px; color:var(--gray-400); }
    .empty-cert .icon { font-size:3rem; margin-bottom:12px; }

    /* Bulk progress */
    .bulk-status { background:#f0fdf4; border:1px solid #86efac; border-radius:10px; padding:14px 18px; margin-bottom:16px; display:none; }
    .bulk-status.show { display:block; }
    .bulk-status p { font-size:0.85rem; color:#166534; font-weight:600; }

    @media(max-width:600px){
      .settings-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div id="app-layout" class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="top-bar" id="top-bar"></header>
    <main class="page-content">

      <!-- Hero -->
      <div class="cert-hero">
        <div class="cert-hero-icon">🎓</div>
        <div>
          <h2>Workshop Certificate Generator</h2>
          <p>Auto-generate personalized participation certificates for all workshop attendees</p>
        </div>
      </div>

      <!-- Workshop Settings -->
      <div class="settings-card">
        <h3>⚙️ Certificate Settings</h3>
        <div class="settings-grid">
          <div class="s-field">
            <label>Workshop / Seminar Title</label>
            <input type="text" id="ws-title" value="Montessori Materials Exploration" placeholder="Workshop name">
          </div>
          <div class="s-field">
            <label>Workshop Date</label>
            <input type="text" id="ws-date" value="Saturday, April 26, 2026" placeholder="e.g. Saturday, April 26, 2026">
          </div>
          <div class="s-field">
            <label>Venue / City</label>
            <input type="text" id="ws-venue" value="Chennai" placeholder="City name">
          </div>
        </div>
      </div>

      <!-- Bulk progress -->
      <div class="bulk-status" id="bulk-status">
        <p id="bulk-msg">Generating certificates...</p>
        <div class="progress-bar-wrap" style="margin-top:8px;">
          <div class="progress-bar-fill" id="bulk-progress" style="width:0%"></div>
        </div>
      </div>

      <!-- Participant List -->
      <div class="part-card">
        <div class="part-header">
          <h3>👥 Participants <span id="part-count" style="color:var(--gray-400);font-weight:400;font-size:0.85rem;"></span></h3>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <label style="font-size:0.8rem;color:var(--gray-500);display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" id="check-all" onchange="toggleAll(this)"> Select All
            </label>
            <button class="btn-generate-all" id="btn-gen-all" onclick="generateSelected()" disabled>
              🎓 Generate Selected
            </button>
          </div>
        </div>

        <!-- Manual name entry -->
        <div class="manual-row">
          <input type="text" id="manual-name" placeholder="Add name manually (e.g. Priya Sharma)" maxlength="60">
          <button class="btn-add-manual" onclick="addManualName()">+ Add</button>
        </div>

        <div id="part-list">
          <div class="empty-cert">
            <div class="icon">📋</div>
            <p>Type a name above and click <strong>+ Add</strong> to generate a certificate.</p>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal-box">
    <h3 id="modal-name">Certificate Preview</h3>
    <iframe id="preview-frame" src=""></iframe>
    <div class="modal-actions">
      <button class="btn-download" id="btn-download-cert">⬇️ Download PDF</button>
      <button class="btn-close-modal" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- jsPDF only — no other external dependencies needed for certificate generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../assets/js/data.js?v=3"></script>
<script src="../assets/js/supabase.js?v=3"></script>
<script src="../assets/js/auth.js?v=3"></script>
<script src="../assets/js/utils.js?v=3"></script>
<script>
  // ── Auth (wrapped — never crash the page) ────────────────
  var session = null;
  try {
    session = getSession();
    if (!session || !['admin','teacher'].includes(session.role)) {
      window.location.href = '../index.html';
    }
  } catch(e) { console.warn('Auth error:', e); }

  try {
    if (session) {
      document.getElementById('sidebar').innerHTML = buildSidebar('workshop-certificates', session);
      document.getElementById('top-bar').innerHTML = buildTopBar(session);
    }
  } catch(e) { console.warn('Sidebar error:', e); }

  // ── Constants ────────────────────────────────────────────
  const PAGE_W       = 842.2;
  const PAGE_H       = 595.5;
  const NAME_Y       = 276.5;   // baseline from top (pts), from PDF analysis
  const TEMPLATE_IMG = '../assets/certificates/workshop-template.jpg';

  var participants  = [];
  var templateCache = null;

  // ── Load template image (cached) ─────────────────────────
  function getTemplate() {
    if (templateCache) return Promise.resolve(templateCache);
    return fetch(TEMPLATE_IMG + '?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('Template image not found (' + r.status + ')');
        return r.blob();
      })
      .then(function(blob) {
        return new Promise(function(resolve, reject) {
          var reader = new FileReader();
          reader.onload  = function() { templateCache = reader.result; resolve(reader.result); };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      });
  }

  // ── Build PDF ────────────────────────────────────────────
  function buildCertificate(name) {
    // Read current settings
    var wsTitle  = (document.getElementById('ws-title')  || {}).value || 'Montessori Materials Exploration';
    var wsDate   = (document.getElementById('ws-date')   || {}).value || 'Saturday, April 26, 2026';
    var wsVenue  = (document.getElementById('ws-venue')  || {}).value || 'Chennai';
    var NAVY = [2, 49, 106];  // #02316A

    return getTemplate().then(function(imgData) {
      var jsPDF = window.jspdf.jsPDF;
      var pdf   = new jsPDF({ orientation: 'landscape', unit: 'pt', format: [PAGE_W, PAGE_H] });
      pdf.addImage(imgData, 'JPEG', 0, 0, PAGE_W, PAGE_H);
      pdf.setTextColor(NAVY[0], NAVY[1], NAVY[2]);

      // ── 1. Participant name (large, bold, auto-size) ──────
      pdf.setFont('helvetica', 'bold');
      var fontSize = 44;
      pdf.setFontSize(fontSize);
      var tw = pdf.getTextWidth(name);
      while (tw > 580 && fontSize > 22) {
        fontSize -= 1;
        pdf.setFontSize(fontSize);
        tw = pdf.getTextWidth(name);
      }
      pdf.text(name, PAGE_W / 2, NAME_Y, { align: 'center' });

      // ── 2. Workshop description line 1 ───────────────────
      // "Who has participated in one day Seminar on '<title>'"
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(16);
      var line1 = 'Who has participated in one day Seminar on “' + wsTitle + '”';
      pdf.text(line1, PAGE_W / 2, 324, { align: 'center' });

      // ── 3. Hosted-by + date line (mixed bold/normal) ─────
      // "hosted by the [BOLD: Ansha Teacher Training Institute] on <date>"
      var p1 = 'hosted by the ';
      var p2 = 'Ansha Teacher Training Institute';
      var p3 = ' on ' + wsDate;
      pdf.setFont('helvetica', 'normal');  pdf.setFontSize(16);
      var w1 = pdf.getTextWidth(p1);
      pdf.setFont('helvetica', 'bold');    pdf.setFontSize(16);
      var w2 = pdf.getTextWidth(p2);
      pdf.setFont('helvetica', 'normal');  pdf.setFontSize(16);
      var w3 = pdf.getTextWidth(p3);
      var lineX = (PAGE_W - (w1 + w2 + w3)) / 2;
      pdf.text(p1, lineX,        350);
      pdf.setFont('helvetica', 'bold');
      pdf.text(p2, lineX + w1,   350);
      pdf.setFont('helvetica', 'normal');
      pdf.text(p3, lineX + w1 + w2, 350);

      // ── 4. Venue line ─────────────────────────────────────
      pdf.setFontSize(16);
      pdf.text('at ' + wsVenue, PAGE_W / 2, 377, { align: 'center' });

      return pdf.output('blob');
    });
  }

  // ── Download ─────────────────────────────────────────────
  function downloadCert(blob, name) {
    var safe = name.replace(/[^a-zA-Z0-9 ]/g, '').trim();
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'Certificate_' + safe + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
  }

  // ── Render participant list ───────────────────────────────
  function renderParticipants() {
    var list = document.getElementById('part-list');
    var cnt  = document.getElementById('part-count');
    if (cnt) cnt.textContent = participants.length ? '(' + participants.length + ')' : '';

    if (!participants.length) {
      list.innerHTML = '<div class="empty-cert"><div class="icon">📋</div>' +
        '<p>Type a name above and click <strong>+ Add</strong> to generate a certificate.</p></div>';
      return;
    }

    list.innerHTML = participants.map(function(p, i) {
      var initials = p.name.split(' ').map(function(w){ return w[0]||''; })
                           .join('').substring(0,2).toUpperCase();
      var meta = [p.city, p.workshop_title, p.whatsapp ? '📱 ' + p.whatsapp : '']
                   .filter(Boolean).join(' · ');
      return '<div class="part-row" id="row-' + i + '">' +
        '<input type="checkbox" class="part-check" id="chk-' + i + '" onchange="updateGenBtn()">' +
        '<div class="part-avatar">' + initials + '</div>' +
        '<div class="part-info">' +
          '<div class="part-name">' + esc(p.name) + '</div>' +
          '<div class="part-meta">' + esc(meta) + '</div>' +
        '</div>' +
        '<button class="btn-cert" id="btn-' + i + '" onclick="generateOne(' + i + ')">🎓 Generate</button>' +
        '<button class="btn-wa-cert" onclick="generateAndSend(' + i + ')" title="Generate & send to WhatsApp">📲 Send</button>' +
      '</div>';
    }).join('');
  }

  // ── Add name manually ────────────────────────────────────
  function addManualName() {
    var inp  = document.getElementById('manual-name');
    var name = inp.value.trim();
    if (!name) return;
    participants.unshift({
      name: name, whatsapp: '', city: '',
      workshop_title: (document.getElementById('ws-title') || {}).value || '',
      source: 'manual'
    });
    inp.value = '';
    renderParticipants();
  }

  document.getElementById('manual-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addManualName();
  });

  function toggleAll(cb) {
    document.querySelectorAll('.part-check').forEach(function(c){ c.checked = cb.checked; });
    updateGenBtn();
  }

  function updateGenBtn() {
    var any = Array.from(document.querySelectorAll('.part-check')).some(function(c){ return c.checked; });
    document.getElementById('btn-gen-all').disabled = !any;
  }

  // ── Generate one ─────────────────────────────────────────
  function generateOne(idx) {
    var p   = participants[idx];
    var btn = document.getElementById('btn-' + idx);
    btn.innerHTML = '⏳ Generating...';
    btn.disabled  = true;

    buildCertificate(p.name).then(function(blob) {
      var url = URL.createObjectURL(blob);
      document.getElementById('preview-frame').src = url;
      document.getElementById('modal-name').textContent = '🎓 Certificate — ' + p.name;
      document.getElementById('preview-modal').classList.add('show');
      document.getElementById('btn-download-cert').onclick = function(){ downloadCert(blob, p.name); };
      btn.innerHTML = '✅ Done';
      btn.classList.add('done');
    }).catch(function(err) {
      alert('Failed: ' + err.message);
      btn.innerHTML = '🎓 Generate';
      btn.disabled  = false;
    });
  }

  // ── Generate + send directly to WhatsApp ─────────────────
  function generateAndSend(idx) {
    var p   = participants[idx];
    var btn = document.getElementById('btn-' + idx);
    btn.innerHTML = '⏳ Generating...';
    btn.disabled  = true;

    buildCertificate(p.name).then(function(blob) {
      btn.innerHTML = '✅ Done';
      btn.classList.add('done');

      var safe = p.name.replace(/[^a-zA-Z0-9 ]/g,'').trim();
      var file = new File([blob], 'Certificate_' + safe + '.pdf', { type: 'application/pdf' });
      var msg  = 'Dear ' + p.name + ',\n\nThank you for attending our workshop! 🎓\n\n' +
                 'Your *Certificate of Participation* from *Ansha Montessori Teacher Training Institute* is attached.\n\n' +
                 'Keep learning and growing! 🌱\n\n- Ansha Montessori Team';
      var wa   = (p.whatsapp || '').replace(/\D/g,'');

      // Try native share (works on Android/iOS mobile)
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Certificate — ' + p.name, text: msg })
          .catch(function(e) {
            // User cancelled or not supported — fallback
            downloadAndOpenWhatsApp(blob, p.name, wa, msg);
          });
      } else {
        // Desktop: download PDF then open WhatsApp with message
        downloadAndOpenWhatsApp(blob, p.name, wa, msg);
      }
    }).catch(function(err) {
      alert('Failed: ' + err.message);
      btn.innerHTML = '🎓 Generate';
      btn.disabled  = false;
    });
  }

  function downloadAndOpenWhatsApp(blob, name, wa, msg) {
    // Step 1: download the PDF
    downloadCert(blob, name);
    // Step 2: open WhatsApp (with small delay so download starts first)
    if (wa) {
      setTimeout(function() {
        window.open('https://wa.me/' + wa + '?text=' + encodeURIComponent(msg), '_blank');
      }, 800);
    }
  }

  function closeModal() {
    document.getElementById('preview-modal').classList.remove('show');
    document.getElementById('preview-frame').src = '';
  }

  // ── Bulk generate ─────────────────────────────────────────
  function generateSelected() {
    var selected = Array.from(document.querySelectorAll('.part-check'))
      .map(function(c, i){ return c.checked ? i : -1; }).filter(function(i){ return i >= 0; });
    if (!selected.length) return;

    var statusEl = document.getElementById('bulk-status');
    var msgEl    = document.getElementById('bulk-msg');
    var progEl   = document.getElementById('bulk-progress');
    statusEl.classList.add('show');
    document.getElementById('btn-gen-all').disabled = true;

    var n = 0;
    function next() {
      if (n >= selected.length) {
        progEl.style.width = '100%';
        msgEl.textContent  = 'Done! ' + selected.length + ' certificate(s) downloaded.';
        document.getElementById('btn-gen-all').disabled = false;
        return;
      }
      var i = selected[n];
      var p = participants[i];
      msgEl.textContent  = 'Generating ' + (n+1) + '/' + selected.length + ': ' + p.name + '...';
      progEl.style.width = ((n / selected.length) * 100) + '%';
      buildCertificate(p.name).then(function(blob) {
        downloadCert(blob, p.name);
        var btn = document.getElementById('btn-' + i);
        if (btn) { btn.innerHTML = '✅ Done'; btn.classList.add('done'); }
        n++;
        setTimeout(next, 800);
      }).catch(function(err) {
        console.error('Failed for ' + p.name + ':', err);
        n++;
        setTimeout(next, 200);
      });
    }
    next();
  }

  // ── WhatsApp ──────────────────────────────────────────────
  function shareWACert(idx) {
    var p   = participants[idx];
    var msg = 'Dear ' + p.name + ',\n\nThank you for attending our workshop!\n' +
              'Your *Certificate of Participation* from Ansha Montessori Teacher Training Institute is ready.\n\n' +
              'Please contact us to receive your certificate.\n\n- Ansha Montessori Team';
    var wa  = (p.whatsapp || '').replace(/\D/g, '');
    window.open('https://wa.me/' + wa + '?text=' + encodeURIComponent(msg), '_blank');
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Init: render immediately, then try Supabase ───────────
  renderParticipants();
  getTemplate().catch(function(){});  // pre-warm template cache

  // Try loading from Supabase silently (5s timeout)
  try {
    var sbTimeout = setTimeout(function(){}, 5000);
    var sbClient = (typeof _sb !== 'undefined') ? _sb : null;
    if (sbClient) {
      Promise.race([
        sbClient.from('workshop_feedback')
          .select('id,name,whatsapp,city,workshop_title,submitted_at')
          .order('submitted_at', { ascending: false }),
        new Promise(function(_, rej){ setTimeout(function(){ rej('timeout'); }, 5000); })
      ]).then(function(result) {
        var data = result && result.data;
        if (data && data.length) {
          participants = data.map(function(r){ return Object.assign({}, r, { source: 'db' }); });
          renderParticipants();
        }
      }).catch(function(e){ console.warn('Supabase skipped:', e); });
    }
  } catch(e) { console.warn('Supabase init skipped:', e); }
</script>
</body>
</html>
