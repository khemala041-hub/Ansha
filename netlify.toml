[build]
  # The LMS lives in lms/ in this repo; publish that folder as the site root
  # so URLs like /admin/marksheets.html and /verify.html match production.
  publish = "lms"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
